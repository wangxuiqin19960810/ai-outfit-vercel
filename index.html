<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 今日穿搭推荐</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f9f9f9;
    }
    h1 { text-align: center; color: #333; }
    .upload-area {
      border: 2px dashed #ccc;
      padding: 40px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
    }
    #preview { max-width: 100%; margin-top: 10px; display: none; }
    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 16px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #result {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    .loading { text-align: center; color: #888; }
  </style>
</head>
<body>
  <h1>👗 AI 今日穿搭推荐</h1>
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    点击上传你的照片
    <input type="file" id="fileInput" accept="image/*" style="display:none" />
  </div>
  <img id="preview" />
  <input type="text" id="location" placeholder="请输入城市（如：北京）" style="width:100%; padding:8px; margin:10px 0;" />
  <button id="generateBtn" disabled>生成穿搭建议</button>
  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
